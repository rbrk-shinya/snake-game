<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe</title>
<style>
  body { margin:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
         min-height:100vh; background:#1e1b4b; color:#e0e7ff; font-family:system-ui, sans-serif; }
  h1 { font-weight:600; }
  #status { font-size:20px; margin-bottom:16px; height:24px; }
  #board { display:grid; grid-template-columns:repeat(3,90px); grid-gap:6px; }
  .cell { width:90px; height:90px; background:#312e81; border-radius:10px; font-size:44px;
          display:flex; align-items:center; justify-content:center; cursor:pointer; user-select:none; }
  .cell:hover { background:#4338ca; }
  button { margin-top:18px; padding:8px 18px; border:none; border-radius:8px;
           background:#6366f1; color:white; font-size:15px; cursor:pointer; }
</style>
</head>
<body>
  <h1>⭕ Tic-Tac-Toe ✖️</h1>
  <div id="status">Your turn (X)</div>
  <div id="board"></div>
  <button onclick="reset()">New Game</button>
<script>
  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  let cells, over;

  const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  function reset() {
    cells = Array(9).fill('');
    over = false;
    statusEl.textContent = 'Your turn (X)';
    render();
  }

  function render() {
    boardEl.innerHTML = '';
    cells.forEach((v, i) => {
      const d = document.createElement('div');
      d.className = 'cell';
      d.textContent = v;
      d.onclick = () => play(i);
      boardEl.appendChild(d);
    });
  }

  function winner(b) {
    for (const [a,c,d] of wins) if (b[a] && b[a] === b[c] && b[a] === b[d]) return b[a];
    return b.every(x => x) ? 'tie' : null;
  }

  function play(i) {
    if (over || cells[i]) return;
    cells[i] = 'X';
    render();
    let w = winner(cells);
    if (w) return end(w);
    // simple AI: win, block, else first free
    const move = pickMove();
    if (move !== -1) cells[move] = 'O';
    render();
    w = winner(cells);
    if (w) return end(w);
  }

  function pickMove() {
    for (const p of ['O','X']) {                 // take win, then block
      for (const [a,b,c] of wins) {
        const line = [cells[a],cells[b],cells[c]];
        if (line.filter(x=>x===p).length===2 && line.includes('')) {
          return [a,b,c][line.indexOf('')];
        }
      }
    }
    if (!cells[4]) return 4;                       // prefer center
    return cells.findIndex(x => !x);
  }

  function end(w) {
    over = true;
    statusEl.textContent = w === 'tie' ? "It's a tie!" : (w === 'X' ? 'You win! 🎉' : 'AI wins 🤖');
  }

  reset();
</script>
</body>
</html>
