<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  body { margin:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
         min-height:100vh; background:#0f172a; color:#e2e8f0; font-family:system-ui, sans-serif; }
  h1 { font-weight:600; letter-spacing:.5px; }
  #score { font-size:20px; margin-bottom:12px; }
  canvas { background:#020617; border:2px solid #334155; border-radius:8px; }
  #msg { height:24px; margin-top:12px; color:#94a3b8; }
</style>
</head>
<body>
  <h1>🐍 Snake</h1>
  <div id="score">Score: 0</div>
  <canvas id="board" width="400" height="400"></canvas>
  <div id="msg">Use arrow keys to move. Press Space to restart.</div>
<script>
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const grid = 20, cells = canvas.width / grid;
  let snake, dir, food, score, alive, loop;

  function reset() {
    snake = [{x:10, y:10}];
    dir = {x:1, y:0};
    score = 0;
    alive = true;
    placeFood();
    document.getElementById('score').textContent = 'Score: 0';
    document.getElementById('msg').textContent = 'Use arrow keys to move. Press Space to restart.';
    clearInterval(loop);
    loop = setInterval(tick, 100);
  }

  function placeFood() {
    food = { x: Math.floor(Math.random()*cells), y: Math.floor(Math.random()*cells) };
  }

  function tick() {
    if (!alive) return;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x < 0 || head.y < 0 || head.x >= cells || head.y >= cells ||
        snake.some(s => s.x === head.x && s.y === head.y)) {
      alive = false;
      document.getElementById('msg').textContent = 'Game over! Press Space to restart.';
      return;
    }
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score += 10;
      document.getElementById('score').textContent = 'Score: ' + score;
      placeFood();
    } else {
      snake.pop();
    }
    draw();
  }

  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#f87171';
    ctx.fillRect(food.x*grid, food.y*grid, grid-2, grid-2);
    ctx.fillStyle = '#4ade80';
    snake.forEach(s => ctx.fillRect(s.x*grid, s.y*grid, grid-2, grid-2));
  }

  document.addEventListener('keydown', e => {
    if (e.code === 'Space') { reset(); return; }
    if (e.key === 'ArrowUp' && dir.y === 0) dir = {x:0, y:-1};
    else if (e.key === 'ArrowDown' && dir.y === 0) dir = {x:0, y:1};
    else if (e.key === 'ArrowLeft' && dir.x === 0) dir = {x:-1, y:0};
    else if (e.key === 'ArrowRight' && dir.x === 0) dir = {x:1, y:0};
  });

  reset();
</script>
</body>
</html>
